user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  combined_custom
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    # Use dedicated files (not /dev/stdout symlinks) so GoAccess can read logs.
    access_log  /var/log/nginx/access-local.log  combined_custom;
    error_log   /var/log/nginx/error-local.log   warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── Access-list for admin endpoints ──────────────────────────────
    # Allow RFC-1918 addresses (LAN / Docker networks) and localhost.
    # All other sources receive 403 on protected locations.
    geo $admin_allowed {
        default          0;
        127.0.0.1        1;
        10.0.0.0/8       1;
        172.16.0.0/12    1;
        192.168.0.0/16   1;
    }

    # ── Upstream: load-balanced web app replicas ──────────────────────
    upstream webapp_backend {
        server webapp1:80;
        server webapp2:80;
    }

    include /etc/nginx/conf.d/*.conf;
}
