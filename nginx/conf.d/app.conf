# ── HTTP (port 8080) – redirect everything to HTTPS ──────────────────
server {
    listen 8080;
    server_name nsa.local _;

    return 301 https://$host:8443$request_uri;
}

# ── HTTPS (port 8443) ─────────────────────────────────────────────────
server {
    listen 8443 ssl default_server;
    server_name nsa.local localhost 127.0.0.1 _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log  /var/log/nginx/access-local.log  combined_custom;

    # ── Main web application (load balanced across webapp1 + webapp2) ─
    location / {
        proxy_pass         http://webapp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── phpMyAdmin – ACCESS LIST: private networks only ───────────────
    location /phpmyadmin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass         http://phpmyadmin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── MailHog web UI – ACCESS LIST: private networks only ──────────
    location /mail/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass         http://mailhog:8025/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── GoAccess log report – ACCESS LIST: private networks only ─────
    location = /logs/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        return 302 /logs/report.html;
    }

    location /logs/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        alias  /var/www/goaccess/;
        index  report.html;
    }
}
