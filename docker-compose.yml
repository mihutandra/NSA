networks:
  frontend:
  backend:

volumes:
  db_master_data:
  db_slave_data:
  redis_data:
  nginx_logs:
  goaccess_report:
  nginx_ssl:

services:

  # ── Reverse proxy / Load balancer ────────────────────────────────────
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - nginx_ssl:/etc/nginx/ssl
      - goaccess_report:/var/www/goaccess:ro
    depends_on:
      - webapp1
      - webapp2
      - phpmyadmin
      - mailhog
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # ── Web application replicas ─────────────────────────────────────────
  webapp1:
    build: ./webapp
    container_name: webapp1
    environment:
      DB_HOST: db-master
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_SLAVE_HOST: db-slave
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASSWORD}
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM: noreply@nsa.local
      APP_URL: ${APP_URL}
      INSTANCE_NAME: webapp1
    depends_on:
      - db-master
      - redis
    networks:
      - backend
    restart: unless-stopped

  webapp2:
    build: ./webapp
    container_name: webapp2
    environment:
      DB_HOST: db-master
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_SLAVE_HOST: db-slave
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASSWORD}
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM: noreply@nsa.local
      APP_URL: ${APP_URL}
      INSTANCE_NAME: webapp2
    depends_on:
      - db-master
      - redis
    networks:
      - backend
    restart: unless-stopped

  # ── Database master ───────────────────────────────────────────────────
  db-master:
    image: mysql:8.0
    container_name: db-master
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - db_master_data:/var/lib/mysql
      - ./db/master.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Database slave ────────────────────────────────────────────────────
  db-slave:
    image: mysql:8.0
    container_name: db-slave
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_slave_data:/var/lib/mysql
      - ./db/slave.cnf:/etc/mysql/conf.d/replication.cnf:ro
    depends_on:
      db-master:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Slave initialiser (one-shot) ──────────────────────────────────────
  db-slave-init:
    image: mysql:8.0
    container_name: db-slave-init
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - ./db/init-slave.sh:/init-slave.sh:ro
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_healthy
    command: ["/bin/bash", "/init-slave.sh"]
    networks:
      - backend
    restart: "no"

  # ── phpMyAdmin ────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    container_name: phpmyadmin
    environment:
      PMA_HOSTS: db-master,db-slave
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${APP_URL}/phpmyadmin/
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db-master
    networks:
      - backend
    restart: unless-stopped

  # ── Redis (session store) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped

  # ── Mail server ───────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    networks:
      - backend
    restart: unless-stopped

  # ── Centralised log analyser ──────────────────────────────────────────
  goaccess:
    build: ./goaccess
    container_name: goaccess
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - goaccess_report:/var/www/html
    networks:
      - backend
    restart: unless-stopped
